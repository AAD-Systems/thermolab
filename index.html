<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThermoLab | Arvexa Technologies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 1.5rem; }
        input { background-color: #0f172a; border: 1px solid #475569; color: white; padding: 0.5rem; border-radius: 0.375rem; width: 100%; }
        button { transition: all 0.2s; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="max-w-4xl mx-auto mb-8 flex justify-between items-center border-b border-slate-700 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-blue-400">ThermoLab <span class="text-xs font-light text-slate-400">v0.1.0-alpha</span></h1>
            <p class="text-sm text-slate-400 italic">Arvexa Technologies • UFAL</p>
        </div>
        <div class="text-right">
            <span id="clock" class="text-xs font-mono text-slate-500"></span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <section class="card shadow-xl">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <span class="bg-blue-600 w-2 h-6 rounded-full"></span>
                Interpolação Linear
            </h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">X₁ (Ex: P₁ ou T₁)</label>
                    <input type="number" id="x1" placeholder="1500">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Y₁ (Ex: h₁ ou s₁)</label>
                    <input type="number" id="y1" placeholder="2792.0">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">X₂</label>
                    <input type="number" id="x2" placeholder="1600">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Y₂</label>
                    <input type="number" id="y2" placeholder="2794.0">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs text-blue-400 mb-1 font-bold">X ALVO (DADO DESEJADO)</label>
                    <input type="number" id="xTarget" class="border-blue-500" placeholder="1525">
                </div>
            </div>
            <button onclick="calculateLinear()" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg">
                CALCULAR Y
            </button>
            <div id="resultBox" class="hidden mt-4 p-4 bg-slate-900 rounded border border-blue-900">
                <p class="text-xs text-slate-500 uppercase">Resultado:</p>
                <p id="yResult" class="text-2xl font-mono text-green-400 font-bold"></p>
                <p id="formulaStr" class="text-[10px] text-slate-400 mt-2 italic font-mono leading-tight"></p>
                <button onclick="saveState()" class="mt-4 text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded">
                    + Salvar no Rastreador
                </button>
            </div>
        </section>

        <section class="card border-dashed border-slate-600">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <span class="bg-green-600 w-2 h-6 rounded-full"></span>
                Rastreador de Estados
            </h2>
            <div id="stateList" class="space-y-3 max-h-[400px] overflow-y-auto pr-2 mb-4 text-sm font-mono">
                <p class="text-slate-500 italic text-xs">Nenhum estado salvo ainda...</p>
            </div>
            <button onclick="exportSession()" class="w-full border border-slate-600 text-slate-300 py-2 rounded hover:bg-slate-800 transition">
                Exportar Sessão (.txt)
            </button>
        </section>
    </main>

    <script>
        let states = [];

        function calculateLinear() {
            const x1 = parseFloat(document.getElementById('x1').value);
            const y1 = parseFloat(document.getElementById('y1').value);
            const x2 = parseFloat(document.getElementById('x2').value);
            const y2 = parseFloat(document.getElementById('y2').value);
            const xTarget = parseFloat(document.getElementById('xTarget').value);

            if ([x1, y1, x2, y2, xTarget].some(isNaN)) {
                alert("Preencha todos os campos corretamente.");
                return;
            }

            const yResult = y1 + (xTarget - x1) * (y2 - y1) / (x2 - x1);
            
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('yResult').innerText = yResult.toFixed(4);
            document.getElementById('formulaStr').innerText = 
                `y = ${y1} + (${xTarget} - ${x1}) * (${y2} - ${y1}) / (${x2} - ${x1})`;
        }

        function saveState() {
            const label = prompt("Dê um nome para este estado (ex: Saída da Bomba):");
            if (!label) return;

            const res = document.getElementById('yResult').innerText;
            const target = document.getElementById('xTarget').value;
            const state = { label, x: target, y: res, time: new Date().toLocaleTimeString() };
            
            states.push(state);
            updateStateList();
        }

        function updateStateList() {
            const list = document.getElementById('stateList');
            if (states.length === 0) return;
            
            list.innerHTML = states.map((s, idx) => `
                <div class="bg-slate-800 p-3 rounded border-l-4 border-green-500 animate-fade-in">
                    <p class="text-blue-400 font-bold">[E${idx+1}] ${s.label}</p>
                    <p class="text-xs text-slate-300 mt-1">X = ${s.x} → Y = <span class="text-white">${s.y}</span></p>
                    <p class="text-[9px] text-slate-500 mt-1 text-right">${s.time}</p>
                </div>
            `).join('');
        }

        function exportSession() {
            if (states.length === 0) return alert("Nada para exportar.");
            let content = "RELATÓRIO DE CICLO TERMODINÂMICO - THERMOLAB\n";
            content += "-------------------------------------------\n\n";
            states.forEach((s, idx) => {
                content += `ESTADO ${idx+1}: ${s.label}\nVALOR ALVO: ${s.x}\nRESULTADO: ${s.y}\n\n`;
            });
            
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sessao_thermolab_${new Date().getTime()}.txt`;
            a.click();
        }

        // Relógio para o cabeçalho
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleString('pt-BR');
        }, 1000);
    </script>
</body>
  </html>
